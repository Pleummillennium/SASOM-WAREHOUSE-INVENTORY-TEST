version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sasom_warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sasom
      POSTGRES_PASSWORD: sasom1234
      POSTGRES_DB: warehouse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
